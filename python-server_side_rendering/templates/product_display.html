<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

{% include 'header.html' %}

<h1>Products</h1>

{% if error %}
<p>{{ error }}</p>

{% elif products %}
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
    </tr>

    {% for p in products %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.category }}</td>
        <td>{{ p.price }}</td>
    </tr>
    {% endfor %}
</table>

{% else %}
<p>No data</p>
{% endif %}

{% include 'footer.html' %}

</body>
</html>
